<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SSPM LearnHub</title>
  <style>
    /* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Inter","Segoe UI",sans-serif;
}

body{
  background:#020617;
  color:#e5e7eb;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ================= HEADER ================= */
header{
  background:#020617;
  padding:16px 48px;
  border-bottom:2px solid #38bdf8;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  color:#38bdf8;
  font-size:22px;
  letter-spacing:2px;
}

nav ul{
  list-style:none;
  display:flex;
  gap:18px;
}

nav ul li a{
  text-decoration:none;
  color:#e5e7eb;
  padding:8px 18px;
  border-radius:6px;
  font-weight:600;
  transition:0.25s;
}

nav ul li a:hover{
  background:#38bdf8;
  color:#020617;
}

/* ================= LOGIN SECTION ================= */
#login{
  flex-grow:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:60px 20px;
}

/* ================= LOGIN BOX ================= */
.login-box{
  background:linear-gradient(180deg,#020617,#0f172a);
  border:1px solid #1e293b;
  border-radius:16px;
  padding:40px;
  width:100%;
  max-width:420px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.login-box h2{
  text-align:center;
  font-size:28px;
  margin-bottom:25px;
  color:#38bdf8;
}

/* ================= FORM ================= */
label{
  display:block;
  margin-bottom:6px;
  font-weight:500;
  color:#cbd5f5;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #1e293b;
  background:#020617;
  color:#e5e7eb;
  margin-bottom:15px;
}

input::placeholder{
  color:#64748b;
}

/* ================= BUTTON ================= */
button[type="submit"]{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:#020617;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

button[type="submit"]:hover{
  background:#22d3ee;
}

/* ================= FORGOT ================= */
.forgot{
  text-align:center;
  margin-top:14px;
}

.forgot a{
  color:#38bdf8;
  text-decoration:none;
}

.forgot a:hover{
  text-decoration:underline;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:16px;
  background:#020617;
  border-top:1px solid #1e293b;
  color:#94a3b8;
  font-size:14px;
}
    
  </style>
</head>
<body>
  <header>
    <div class="logo"><h1>SSPM DIGITAL CAMPUS</h1></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <section id="login">
    <div class="login-box">
      <h2>Login</h2>
      <form id="loginForm">
        <label for="role">Select Role:</label>
        <select id="role" required>
          <option value="">-- Choose --</option>
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
      </form>
      <div class="forgot">
        <a href="reset.html">Forgot Password?</a>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 SSPM DIGITAL CAMPUS — All Rights Reserved.</p>
  </footer>

  <script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    role: document.getElementById("role").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value
  };

  try {
    const res = await fetch("http://localhost:5000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      // ✅ Save ALL required data to localStorage
      localStorage.setItem("token", result.token);
      localStorage.setItem("role", result.role);
      localStorage.setItem("email", data.email);  // ← Email from form input
      
      // 🔍 Debug log
      console.log("✅ Login successful! Saved:", {
        token: result.token?.substring(0, 30) + "...",
        role: result.role,
        email: data.email
      });
      
      alert(result.message);
      
      // ✅ Redirect based on role
      if (result.role === "student") {
        window.location.href = "student.html";
      } else {
        window.location.href = "instructor.html";
      }
    } else {
      // ❌ Login failed
      console.error("❌ Login failed:", result.message);
      alert(result.message);
    }
  } catch (err) {
    console.error("❌ Login error:", err);
    alert("Server error. Please try again later.");
  }
});
</script>
</body>
</html>
