<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard - SSPM</title>

    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0b0c2a;
        color: #fff;
      }

      .sidebar {
        width: 220px;
        background: #862481;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        padding: 20px 10px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .sidebar h2 {
        text-align: center;
        font-size: 18px;
        margin-bottom: 30px;
        color: #00ffcc;
      }

      .sidebar button {
        background: none;
        border: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 6px;
        transition: 0.3s;
        cursor: pointer;
        font: inherit;
        text-align: left;
        width: 100%;
      }

      .sidebar button:hover {
        background: #943bcf;
        color: #000;
      }

      .main {
        margin-left: 240px;
        padding: 20px;
      }

      .hidden {
        display: none;
      }

      .profile-banner {
        background: url("https://static.vecteezy.com/system/resources/previews/009/384/878/original/abstract-dark-blue-background-with-smooth-lines-free-vector.jpg  ")
          no-repeat center/cover;
        height: 180px;
        border-radius: 10px;
      }

      .profile-card {
        margin-top: -70px;
        background-color: #484b96;
        border-radius: 10px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0px 4px 10px rgba(148, 77, 219, 0.6);
      }

      .profile-pic {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 4px solid #00ffcc;
        object-fit: cover;
        background: white;
      }

      .profile-info h2 {
        margin: 0;
        font-size: 22px;
      }

      .profile-info p {
        margin: 5px 0;
        color: #ddd;
      }

      .profile-info b {
        color: #00ffcc;
      }

      .tracker {
        margin-top: 30px;
        background: #1a1c4d;
        padding: 20px;
        border-radius: 10px;
      }

      .tracker h3 {
        margin-bottom: 10px;
        color: #ffcc00;
      }

      .progress-bar {
        width: 100%;
        height: 25px;
        background: #333;
        border-radius: 12px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #28a745, #85e085);
        text-align: center;
        color: white;
        font-size: 14px;
        line-height: 25px;
        transition: width 0.6s ease;
      }

      .subject-card {
        background: #1a1c4d;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .subject-btn,
      .quiz-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
        text-align: left;
      }

      .subject-btn {
        background: linear-gradient(135deg, #862481, #b84bc4);
        margin-bottom: 8px;
      }

      .quiz-btn {
        background: linear-gradient(135deg, #ff6fff, #862481);
      }

      .subject-btn:hover,
      .quiz-btn:hover {
        opacity: 0.9;
      }

      .subject-detail {
        margin-top: 10px;
        padding: 10px;
        border-radius: 8px;
        background: #0f1135;
        display: none;
      }

      .resource-link {
        color: #00ffcc;
        text-decoration: none;
      }

      .resource-link:hover {
        text-decoration: underline;
      }

      h4 {
        margin: 10px 0 5px 0;
        color: #ffb6ff;
      }

      #my-learning {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        padding: 20px;
      }

      .contents-container {
        display: none;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        padding: 15px 25px;
        width: 80%;
        max-width: 600px;
        color: #eee;
        margin-bottom: 10px;
        animation: fadeIn 0.5s ease-in-out;
      }

      .contents-container.active {
        display: block;
      }

      .content-item {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px 0;
      }

      .content-title {
        color: #ffb6ff;
        font-weight: 600;
        font-size: 17px;
      }

      .content-desc {
        font-size: 14px;
        color: #ccc;
      }

      .content-link {
        color: #ff6fff;
        text-decoration: none;
        font-weight: bold;
      }

      .quiz-questions {
        display: none;
        background: #0f1135;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .quiz-questions.active {
        display: block;
      }

      .question {
        margin-bottom: 15px;
      }

      .option {
        display: block;
        margin: 5px 0;
        cursor: pointer;
        color: #ddd;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    

      .course-title-btn {
        width: 100%;
        background: linear-gradient(135deg, #862481, #b84bc4);
        border: none;
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        text-align: left;
      }

      .course-title-btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>SSPM DIGITAL CAMPUS</h2>
      <button type="button" onclick="showSection('dashboard')">📊 My Dashboard</button>
      <button type="button" onclick="showSection('learning')">📘 My Learning</button>
      <button type="button" onclick="showSection('courses')">🎓 My Courses</button>
      <button type="button" onclick="showSection('assignments')">📑 My Assignments</button>
      <button type="button" onclick="showSection('quizzes')">🧠 My Quizzes</button>
      <button type="button" onclick="showSection('interests')">⭐ My Interests</button>
      <button type="button" onclick="showSection('achievements')">🏆 Achievements</button>
      
      <!-- ✅ NEW: Discussion Forum Button (links to discussion.html) -->
      <button type="button" onclick="window.location.href='discussion.html'">💬 Discussion Forum</button>
    </div>

    <div class="main">
      <!-- Dashboard -->
      <div id="dashboardSection">
        <div class="profile-banner"></div>
        <div class="profile-card">
          <img
            src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png  "
            class="profile-pic"
            alt="Student profile"
          />
          <div class="profile-info">
            <h2 id="profileName">Student Name</h2>
            <p>📧 <span id="profileEmail">student@example.com</span></p>
            <p>🎓 Dept: <b id="profileDept">CSE</b> | Sem: <b id="profileSem">5</b></p>
            <p>🆔 Roll No: <b id="profileRoll">12345</b></p>
          </div>
        </div>
        <div class="tracker">
          <h3>📈 Overall Progress</h3>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill">0%</div>
          </div>
        </div>
      </div>

      <!-- My Learning -->
      <div id="learningSection" class="hidden">
        <h1 style="text-align:center;color:#ffb6ff;margin-top:20px">📘 My Learning</h1>
        <div id="my-learning"></div>
      </div>

      <!-- Courses -->
      <div id="coursesSection" class="hidden">
        <h1 style="text-align:center;color:#ffe066">🎓 My Courses</h1>
        <div id="coursesContainer" style="margin-top:20px"></div>
      </div>
      

      <!-- Assignments -->
      <div id="assignmentsSection" class="hidden">
        <h2 style="color:#ffb6ff">📑 My Assignments</h2>
        <div id="assignmentsContainer"></div>
      </div>

      <!-- Quizzes -->
      <div id="quizzesSection" class="hidden">
        <h2 style="color:#ffb6ff">🧠 My Quizzes</h2>
        <div id="quizzesContainer"></div>
      </div>

      <!-- Interests -->
      <div id="interestsSection" class="hidden">
        <h2 style="color:#ffb6ff">⭐ My Interests</h2>
      </div>

      <!-- Achievements -->
      <div id="achievementsSection" class="hidden">
        <h2 style="color:#ffb6ff">🏆 Achievements</h2>
      </div>
    </div>

    <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    if (!token || role !== "student") {
      alert("Please log in as a student.");
      location.href = "/login.html";
      return;
    }

    try {
      const res = await fetch("/student-dashboard", {
        headers: { Authorization: "Bearer " + token },
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(`HTTP ${res.status}: ${err}`);
      }

      const data = await res.json();

      // Profile
      const profile = data.profile || {};
      document.getElementById("profileName").innerText = profile.name || "—";
      document.getElementById("profileEmail").innerText = profile.email || "—";
      document.getElementById("profileRoll").innerText = profile.roll || "—";
      document.getElementById("profileDept").innerText = profile.department || "—";
      document.getElementById("profileSem").innerText = profile.semester || "—";

      const progress = profile.progress || 0;
      const progressFill = document.getElementById("progressFill");
      progressFill.style.width = `${Math.min(100, Math.max(0, progress))}%`;
      progressFill.innerText = `${progress}%`;

      // My Learning
      const learningContainer = document.getElementById("my-learning");
      learningContainer.innerHTML = "";
      if (data.learning && data.learning.length > 0) {
        data.learning.forEach((subject) => {
          const btn = document.createElement("button");
          btn.className = "subject-btn";
          btn.textContent = subject.subjectName || "Untitled";

          const contentsDiv = document.createElement("div");
          contentsDiv.className = "contents-container";

          if (subject.contents && subject.contents.length > 0) {
            subject.contents.forEach((content) => {
              const item = document.createElement("div");
              item.className = "content-item";
              item.innerHTML = `
                <div class="content-title">${content.title || "—"}</div>
                <div class="content-desc">${content.description || ""}</div>
                ${
                  content.resources
                    ? `<a href="${content.resources}" class="content-link" target="_blank">View Resource</a>`
                    : ""
                }
              `;
              contentsDiv.appendChild(item);
            });
          } else {
            contentsDiv.innerHTML = "<p>No content available.</p>";
          }

          btn.addEventListener("click", () => {
            contentsDiv.classList.toggle("active");
          });

          learningContainer.appendChild(btn);
          learningContainer.appendChild(contentsDiv);
        });
      } else {
        learningContainer.innerHTML = "<p>No learning materials available.</p>";
      }

      // 🔹 UPDATED: Courses with Discussion Buttons
      const container = document.getElementById("coursesContainer");
      container.innerHTML = "";

      if (data.courses && data.courses.length > 0) {
        data.courses.forEach(course => {
          // Validate courseId format
          const isValidId = /^[0-9a-fA-F]{24}$/.test(course._id);
          
          // Course title button
          const titleBtn = document.createElement("button");
          titleBtn.className = "course-title-btn";
          titleBtn.innerText = course.title || "Untitled Course";
          titleBtn.onclick = () => {
            window.location.href = `course.html?id=${course._id}`;
          };
          container.appendChild(titleBtn);
          
          // Discussion button for this course
          if (isValidId) {
            const discBtn = document.createElement("button");
            discBtn.className = "quiz-btn";
            discBtn.innerText = "💬 View Discussions";
            discBtn.style.background = "linear-gradient(135deg, #2575fc, #6a11cb)";
            discBtn.style.marginBottom = "15px";
            discBtn.onclick = () => {
              window.location.href = `discussion.html?courseId=${course._id}`;
            };
            container.appendChild(discBtn);
          }
        });
      } else {
        container.innerHTML = "<p>No courses available.</p>";
      }

      // Assignments
      const assignmentContainer = document.getElementById("assignmentsContainer");
      assignmentContainer.innerHTML = "";
      if (data.assignments && data.assignments.length > 0) {
        data.assignments.forEach((a) => {
          assignmentContainer.innerHTML += `
            <div class="subject-card">
              <h4>${a.title || "Untitled Assignment"}</h4>
              <p>${a.desc || ""}</p>
              <p><b>Due:</b> ${a.due || "—"} | <b>Marks:</b> ${a.marks || "—"}</p>
            </div>
          `;
        });
      } else {
        assignmentContainer.innerHTML = "<p>No assignments.</p>";
      }

      // Quizzes
      const quizContainer = document.getElementById("quizzesContainer");
      quizContainer.innerHTML = "";
      if (!data.quizzes || data.quizzes.length === 0) {
        quizContainer.innerHTML = "<p>No quizzes available.</p>";
      } else {
        data.quizzes.forEach((quiz) => {
          const quizBtn = document.createElement("button");
          quizBtn.className = "quiz-btn";
          quizBtn.textContent = `${quiz.title || "Untitled Quiz"} (${quiz.questions?.length || 0} Questions)`;
          quizBtn.addEventListener("click", () => {
            window.location.href = `quiz.html?quizId=${quiz._id}`;
          });
          quizContainer.appendChild(quizBtn);
        });
      }
    } catch (err) {
      console.error("Dashboard Error:", err);
      alert("Failed to load dashboard. Please try again.");
    }
  });

  function showSection(sectionId) {
    const sections = [
      "dashboard",
      "learning",
      "courses",
      "assignments",
      "quizzes",
      "interests",
      "achievements",
    ];
    sections.forEach((id) => {
      const el = document.getElementById(id + "Section");
      if (el) el.classList.add("hidden");
    });
    const target = document.getElementById(sectionId + "Section");
    if (target) target.classList.remove("hidden");
  }
</script>
  </body>
</html>
